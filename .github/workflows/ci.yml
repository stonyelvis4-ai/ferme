name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: corepack pnpm --filter @ferm-plus/backend exec prisma generate

      - name: Build backend
        run: corepack pnpm --filter @ferm-plus/backend run build

      - name: Build frontend
        run: corepack pnpm --filter @ferm-plus/frontend run build
